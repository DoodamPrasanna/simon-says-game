<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Says Game</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="game-container">

        <h1>Simon <span>Says</span></h1>

        <h3 id="game-status">Press Any Key or Tap Start</h3>

        <button id="startBtn">🎮 Start Game</button>

        <div class="score-container">
            <p id="currentScore">Level: 0</p>
            <p id="highScore">High Score: 0</p>
        </div>

        <div class="btn-container">

            <div class="line1">
                <div class="btn yellow" id="yellow"></div>
                <div class="btn green" id="green"></div>
            </div>

            <div class="line2">
                <div class="btn red" id="red"></div>
                <div class="btn blue" id="blue"></div>
            </div>

        </div>

        <div class="footer">
            Built with HTML • CSS • JavaScript
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
